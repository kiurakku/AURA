# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Deployment configuration check
        run: |
          if [ -z "${{ vars.FLY_APP_NAME }}" ]; then
            echo "FLY_APP_NAME is not configured; skipping deploy."
          else
            echo "FLY_APP_NAME is configured."
          fi

  deploy:
    name: Deploy app
    needs: preflight
    if: ${{ vars.FLY_APP_NAME != '' }}
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --app "${{ vars.FLY_APP_NAME }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
